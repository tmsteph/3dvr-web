  <rect x="78" y="562" width="1044" height="1" fill="#ffffff" opacity="0.22" />
  <text x="78" y="598" fill="#ffffff" opacity="0.76" font-family="Arial, sans-serif" font-size="20">Open web • community • practical digital systems</text>
